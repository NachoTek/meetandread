name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -e ".[dev]"

      - name: Lint
        run: python -m flake8 src/ --max-line-length=120

      - name: Run tests
        run: |
          python -m pytest -m "not slow" --tb=short -q --timeout=300 -p no:qt `
            --ignore=tests/test_settings_history.py `
            2>&1 | Out-File test_output.txt -Encoding utf8

      - name: Verify tests passed
        if: always()
        run: |
          $content = Get-Content test_output.txt -Raw
          Write-Host $content

          if ($content -match '(\d+) failed') {
            $failed = $Matches[1]
            Write-Error "$failed test(s) failed"
            exit 1
          }

          if ($content -match '(\d+) passed') {
            $passed = $Matches[1]
            Write-Host "All $passed tests passed"
            exit 0
          }

          Write-Error "No test results found in output"
          exit 1

  release:
    needs: [test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -e .

      - run: pip install pyinstaller

      - name: Build
        run: pyinstaller meetandread.spec --noconfirm

      - name: Package
        run: Compress-Archive -Path dist/meetandread -DestinationPath meetandread-${{ github.ref_name }}.zip

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: meetandread-${{ github.ref_name }}.zip
