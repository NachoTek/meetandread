name: Build Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -e ".[dev]"

      - name: Lint
        run: python -m flake8 src/ --max-line-length=120

      - name: Run tests
        continue-on-error: true
        run: |
          python -m pytest -m "not slow" --tb=short -q --timeout=300 -p no:qt `
            --ignore=tests/test_settings_history.py `
            2>&1 | Out-File test_output.txt -Encoding utf8

      - name: Verify tests passed
        if: always()
        run: |
          $content = Get-Content test_output.txt -Raw
          Write-Host $content

          if ($content -match '(\d+) failed') {
            $failed = $Matches[1]
            Write-Error "$failed test(s) failed"
            exit 1
          }

          if ($content -match '(\d+) passed') {
            $passed = $Matches[1]
            Write-Host "All $passed tests passed"
            exit 0
          }

          Write-Error "No test results found in output"
          exit 1

  build-validation:
    needs: [test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -e .

      - run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller meetandread.spec --noconfirm

      - name: Validate build contains required libraries
        run: python validate_build.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: meetandread-windows
          path: dist/meetandread
          retention-days: 7

      - name: Archive for download
        if: github.event_name == 'push'
        run: Compress-Archive -Path dist/meetandread -DestinationPath meetandread-dryrun.zip

      - name: Upload archive
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: meetandread-dryrun
          path: meetandread-dryrun.zip
          retention-days: 7

      - name: Check size
        run: |
          $size = (Get-ChildItem -Path dist/meetandread -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Build size: $([math]::Round($size, 2)) MB"