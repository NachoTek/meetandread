name: Tests

on:
  push:
    tags: ["v*"]
  schedule:
    - cron: "0 3 * * *" # nightly at 03:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -e ".[dev]"

      - name: Run tests
        id: pytest
        continue-on-error: true
        run: python -m pytest -m "not slow" --tb=short -q --timeout=300 -p no:qt --ignore=tests/test_settings_history.py 2>&1 | Out-File test_output.txt -Encoding utf8

      - name: Verify tests passed
        if: always()
        run: |
          $content = Get-Content test_output.txt -Raw
          Write-Host $content
          if ($content -match '(\d+) failed') {
            Write-Error "Test failures detected"
            exit 1
          }
          if ($content -match '(\d+) passed') {
            Write-Host "All tests passed (PyQt6 teardown exit code ignored)"
          } else {
            Write-Error "No test results found"
            exit 1
          }
