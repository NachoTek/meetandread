name: PR Review Trigger

# Fires ONLY when the build-validation CI completes.
# If CI failed, sends a webhook to Hermes to re-engage the review agent.
# If CI passed, does nothing — no point spinning up an agent to celebrate.

on:
  workflow_run:
    workflows: ["Build Validation"]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  trigger-review-on-failure:
    runs-on: ubuntu-latest
    # Only run if CI failed — success means we're done
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Find associated PR and send webhook
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          WEBHOOK_URL: https://homelab.nachotek.com/hooks/meetandread-pr
        run: |
          set -euo pipefail

          RUN_ID="${{ github.event.workflow_run.id }}"
          REPO="${{ github.repository }}"

          echo "Workflow run $RUN_ID completed with failure. Looking for associated PR..."

          # Get PRs associated with this workflow run
          PR_DATA=$(gh api "/repos/${REPO}/actions/runs/${RUN_ID}/pulls" --jq '.[].number' 2>/dev/null || echo "")

          if [ -z "$PR_DATA" ]; then
            echo "No PRs associated with this workflow run. Skipping."
            exit 0
          fi

          for PR_NUMBER in $PR_DATA; do
            echo "Found PR #$PR_NUMBER. Sending CI failure webhook..."

            # Build the webhook payload — looks like a pull_request event
            # with a custom action so the Hermes agent can distinguish it
            PAYLOAD=$(cat <<EOF
          {
            "action": "ci_failed",
            "number": ${PR_NUMBER},
            "repository": {
              "full_name": "${REPO}"
            },
            "check_run": {
              "id": ${RUN_ID},
              "conclusion": "failure"
            }
          }
          EOF
            )

            # Compute HMAC-SHA256 signature (GitHub-style X-Hub-Signature-256)
            SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $NF}')

            echo "Sending webhook to Hermes..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: pull_request" \
              -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
              -d "$PAYLOAD")

            echo "Webhook response: HTTP $RESPONSE"

            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Review agent triggered for PR #$PR_NUMBER"
            else
              echo "❌ Webhook delivery failed (HTTP $RESPONSE)"
            fi
          done
