name: PR Review Trigger

# Fires ONLY when the build-validation CI completes.
# If CI failed, sends a webhook to Hermes to re-engage the review agent.
# If CI passed, does nothing — no point spinning up an agent to celebrate.

on:
  workflow_run:
    workflows: ["Build Validation"]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  trigger-review-on-failure:
    runs-on: ubuntu-latest
    # Only run if CI failed — success means we're done
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Send CI failure webhook to Hermes
        env:
          WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          WEBHOOK_URL: https://homelab.nachotek.com/hooks/meetandread-pr
        run: |
          set -euo pipefail

          # Extract PR number from the workflow_run event payload
          # github.event.workflow_run.pull_requests is populated when
          # the original workflow was triggered by a pull_request event
          PR_COUNT=$(echo '${{ toJSON(github.event.workflow_run.pull_requests) }}' | jq 'length')

          if [ "$PR_COUNT" = "0" ] || [ -z "$PR_COUNT" ]; then
            echo "No PRs associated with this workflow run. Skipping."
            exit 0
          fi

          PR_NUMBER=$(echo '${{ toJSON(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number')
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.event.workflow_run.id }}"

          echo "Build Validation run #$RUN_ID failed for PR #$PR_NUMBER"

          # Build the webhook payload — uses pull_request event type
          # with a custom action so the Hermes agent can distinguish it
          PAYLOAD=$(cat <<ENDJSON
          {"action":"ci_failed","number":${PR_NUMBER},"repository":{"full_name":"${REPO}"},"check_run":{"id":${RUN_ID},"conclusion":"failure"}}
          ENDJSON
          )

          # Compute HMAC-SHA256 signature (GitHub-style X-Hub-Signature-256)
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $NF}')

          echo "Sending CI failure webhook to Hermes..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
            -d "$PAYLOAD")

          echo "Webhook response: HTTP $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "Review agent triggered for PR #$PR_NUMBER"
          else
            echo "Webhook delivery failed (HTTP $RESPONSE)"
          fi
